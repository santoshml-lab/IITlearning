<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>IIT Learning Hub 🚀</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#0ea5e920,transparent 25%),
radial-gradient(circle at bottom right,#9333ea20,transparent 25%),
#020617;

color:white;
min-height:100vh;
overflow-x:hidden;

}

header{

padding:50px 20px;
text-align:center;

}

header h1{

font-size:52px;
font-weight:700;
color:#38bdf8;

}

header p{

margin-top:15px;
opacity:.8;
font-size:18px;

}

.hero{

max-width:900px;
margin:auto;
margin-top:25px;

padding:30px;

border-radius:25px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 40px rgba(56,189,248,.15);

}

.container{

width:95%;
max-width:1500px;

margin:auto;

display:grid;

grid-template-columns:
340px 1fr;

gap:20px;

padding-bottom:40px;

}

.card{

background:rgba(255,255,255,.05);

border-radius:24px;

padding:20px;

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(15px);

box-shadow:
0 0 25px rgba(56,189,248,.08);

}

.card h2{

margin-bottom:15px;
color:#38bdf8;

}

select,
input{

width:100%;

padding:14px;

margin-top:12px;

border:none;
outline:none;

border-radius:14px;

background:#111827;

color:white;

font-size:15px;

}

button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

background:linear-gradient(
45deg,
#38bdf8,
#0ea5e9
);

color:black;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

.stats{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

margin-top:20px;

}

.stat{

background:#111827;

padding:15px;

border-radius:16px;

text-align:center;

}

.stat h3{

color:#38bdf8;

font-size:24px;

}

.learn-box{

line-height:1.9;

font-size:15px;

color:#e2e8f0;

}

.learn-box h1,
.learn-box h2,
.learn-box h3{

color:#38bdf8;

margin-top:15px;

}

.section-box{

margin-top:15px;

background:#111827;

padding:15px;

border-radius:16px;

}

.mcq-container{

margin-top:20px;

}

.option{

background:#111827;

padding:15px;

border-radius:14px;

margin-top:10px;

cursor:pointer;

border:1px solid transparent;

transition:.3s;

}

.option:hover{

border-color:#38bdf8;

transform:translateX(5px);

}

.option.active{

border-color:#38bdf8;

background:#1e293b;

}

.result{

margin-top:15px;

font-weight:700;

font-size:18px;

}

.loader{

display:none;

font-weight:bold;

color:#38bdf8;

margin-bottom:15px;

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

header h1{

font-size:36px;

}

}

</style></head><body><header><h1>🚀 IIT Learning Hub</h1><p>
Foundation → JEE Main → JEE Advanced
</p><div class="hero"><h2>
Learn Concepts 📚<br>
Practice Smarter ⚡<br>
Crack IIT 🎯
</h2></div></header><div class="container"><div><div class="card"><h2>🎓 Learning Panel</h2><select id="subject"><option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option></select><select id="difficulty"><option>Foundation</option>
<option>JEE Main</option>
<option>JEE Advanced</option></select><input
id="topic"
placeholder="Enter Topic">

<button onclick="startLearning()">
🚀 Start Learning
</button><div class="stats"><div class="stat">
<h3 id="topicsLearned">0</h3>
<small>Topics</small>
</div><div class="stat">
<h3 id="mcqSolved">0</h3>
<small>MCQs</small>
</div></div></div></div><div><div class="card"><h2>🧠 AI Learning</h2><div
class="loader"
id="loader">
Loading IIT Concepts...
</div><div
id="learningContent"
class="learn-box">Start learning a topic 🚀

</div></div><div class="card" style="margin-top:20px;"><h2>🎯 Practice MCQ</h2><div id="mcqQuestion">
No MCQ generated yet.
</div><div
id="mcqOptions"
class="mcq-container">
</div><button onclick="checkAnswer()">
✅ Check Answer
</button><div
id="result"
class="result">
</div></div></div></div>
  <script>

const API =
"https://iitpreparation.onrender.com";

let selectedOption = "";
let correctAnswer = "";

let topicCount = 0;
let mcqCount = 0;

function updateStats(){

document.getElementById("topicsLearned").innerText =
topicCount;

document.getElementById("mcqSolved").innerText =
mcqCount;

}

async function startLearning(){

const subject =
document.getElementById("subject").value;

const difficulty =
document.getElementById("difficulty").value;

const topic =
document.getElementById("topic").value;

if(!topic){

alert("Enter Topic");
return;

}

document.getElementById("loader").style.display =
"block";

document.getElementById("learningContent").innerHTML =
"Loading...";

document.getElementById("mcqQuestion").innerHTML =
"Generating MCQ...";

document.getElementById("mcqOptions").innerHTML = "";

document.getElementById("result").innerHTML = "";

try{

const response = await fetch(
`${API}/topic-learn`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

subject:subject,
topic:`${topic} (${difficulty})`

})

}
);

const data = await response.json();

const text = data.result || "No response";

document.getElementById(
"learningContent"
).innerText = text;

extractMCQ(text);

topicCount++;

updateStats();

}

catch(err){

document.getElementById(
"learningContent"
).innerHTML =
"Backend Error";

console.log(err);

}

document.getElementById("loader").style.display =
"none";

}

function extractMCQ(text){

let lines = text.split("\n");

let question = "";

let options = [];

correctAnswer = "";

for(let line of lines){

line = line.trim();

if(
line.startsWith("Question")
){

question += line + "<br>";

}

if(
line.startsWith("A)") ||
line.startsWith("B)") ||
line.startsWith("C)") ||
line.startsWith("D)")
){

options.push(line);

}

if(
line.toLowerCase().includes(
"correct answer"
)
){

let parts =
line.split(":");

if(parts.length > 1){

correctAnswer =
parts[1]
.trim()
.charAt(0)
.toUpperCase();

}

}

}

document.getElementById(
"mcqQuestion"
).innerHTML =
question || "MCQ Generated";

let box =
document.getElementById(
"mcqOptions"
);

box.innerHTML = "";

options.forEach(opt=>{

let div =
document.createElement("div");

div.className = "option";

div.innerText = opt;

div.onclick = ()=>{

document
.querySelectorAll(".option")
.forEach(el=>{

el.classList.remove("active");

});

div.classList.add("active");

selectedOption =
opt.charAt(0).toUpperCase();

};

box.appendChild(div);

});

}

async function checkAnswer(){

if(!selectedOption){

alert("Select an option");
return;

}

try{

const response =
await fetch(
`${API}/check-mcq`,
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

selected_answer:
selectedOption,

correct_answer:
correctAnswer

})

}
);

const data =
await response.json();

document.getElementById(
"result"
).innerHTML =
data.message;

mcqCount++;

updateStats();

}

catch(err){

document.getElementById(
"result"
).innerHTML =
"Error checking answer";

}

}

updateStats();

</script></body>
</html>
